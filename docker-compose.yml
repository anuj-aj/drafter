version: "3.9"

services:
  db:
    image: postgres:15
    container_name: drafter-db
    restart: always
    environment:
      POSTGRES_USER: drafter
      POSTGRES_PASSWORD: drafter
      POSTGRES_DB: drafter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: drafter-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

volumes:
  postgres_data:
  ollama_data: